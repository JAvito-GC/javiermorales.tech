<section class="hero">
  <div class="hero__bg"></div>
  <div class="hero__content">
    <p class="hero__greeting">{{ if eq .Lang "es" }}Hola, soy{{ else }}Hello, I'm{{ end }}</p>
    <h1 class="hero__name">Javier<br>Morales</h1>
    <p class="hero__tagline">{{ i18n "hero_tagline" }}</p>
    <p class="hero__subtitle">{{ .Site.Params.description }}</p>
    <a href="#projects" class="hero__cta">{{ i18n "hero_cta" }}<span class="hero__cta-arrow">&darr;</span></a>
  </div>
</section>
