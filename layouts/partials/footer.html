<footer class="footer" id="contact">
  <div class="container">
    <h2 class="section__title reveal">{{ i18n "contact_title" }}</h2>
    <p class="footer__text reveal">{{ i18n "contact_text" }}</p>

    <form class="contact-form reveal" id="contact-form" action="https://formspree.io/f/xpwdkjqr" method="POST">
      <div class="contact-form__row">
        <input type="text" name="name" class="contact-form__input" placeholder="{{ if eq .Lang "es" }}Nombre{{ else }}Name{{ end }}" required>
        <input type="email" name="email" class="contact-form__input" placeholder="Email" required>
      </div>
      <textarea name="message" class="contact-form__textarea" placeholder="{{ if eq .Lang "es" }}Tu mensaje...{{ else }}Your message...{{ end }}" required></textarea>
      <button type="submit" class="contact-form__submit">{{ if eq .Lang "es" }}Enviar mensaje{{ else }}Send message{{ end }} &rarr;</button>
    </form>
    <div class="contact-form__success" id="form-success">
      {{ if eq .Lang "es" }}Mensaje enviado. Te respondere pronto.{{ else }}Message sent. I'll get back to you soon.{{ end }}
    </div>

    <div class="footer__links reveal">
      <a href="mailto:{{ .Site.Params.email }}" target="_blank" rel="noopener" class="footer__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
        Email
      </a>
      <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener" class="footer__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
      </a>
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener" class="footer__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        GitHub
      </a>
    </div>
    <div class="footer__bottom">
      <p class="footer__location">{{ i18n "footer_location" }}</p>
      <p class="footer__copy">&copy; {{ now.Year }} Javier Morales</p>
    </div>
  </div>
  <script>
  (function(){
    var form = document.getElementById('contact-form');
    var success = document.getElementById('form-success');
    if(!form) return;
    form.addEventListener('submit', function(e){
      e.preventDefault();
      var data = new FormData(form);
      fetch(form.action, {method:'POST', body:data, headers:{'Accept':'application/json'}})
        .then(function(r){
          if(r.ok){
            form.style.display='none';
            success.style.display='block';
          }
        });
    });
  })();
  </script>
</footer>
