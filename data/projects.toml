[[project]]
title_en = "MotoRadar — Price Intelligence for Motorcycles"
title_es = "MotoRadar — Inteligencia de Precios de Motos"
description_en = "Full-stack price comparison engine for second-hand enduro and trail motorcycles in Spain. Aggregates listings from 4 platforms, applies z-score deal scoring, tracks price trends, and detects outliers. Built with FastAPI, PostgreSQL, HTMX, and a custom browser extension for data collection."
description_es = "Motor de comparacion de precios de motos enduro y trail de segunda mano en Espana. Agrega listings de 4 plataformas, aplica scoring de ofertas con z-score, rastrea tendencias de precios y detecta outliers. Construido con FastAPI, PostgreSQL, HTMX y una extension de navegador para recoleccion de datos."
tags = ["Python", "FastAPI", "PostgreSQL", "HTMX", "Playwright"]
icon = "chart"
featured = true
url = "https://motoradar.es"

